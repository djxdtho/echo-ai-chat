<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="A sleek, modern AI chat UI that feels intelligent, calm, and premium.">
<meta name="theme-color" content="#0a0a0a">
<title>echo — AI Chat</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='url(%23g)' stroke-width='4'/%3E%3Cpath d='M35 65V35l30 15z' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#121212;--surface2:#1a1a1a;--border:rgba(255,255,255,.08);--text:#e8e8e8;--text-dim:rgba(255,255,255,.45);--accent:#00d4ff;--accent2:#8b5cf6;--user-bubble:rgba(0,212,255,.12);--ai-bubble:rgba(255,255,255,.04);--radius:12px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--sidebar-w:280px}
.light{--bg:#f5f5f0;--surface:#fff;--surface2:#f0efe8;--border:rgba(0,0,0,.08);--text:#1a1a1a;--text-dim:rgba(0,0,0,.4);--user-bubble:rgba(0,212,255,.1);--ai-bubble:rgba(0,0,0,.03)}
.amoled{--bg:#000;--surface:#000;--surface2:#0a0a0a;--border:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .5s,color .4s;display:flex}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:background .5s;z-index:10}
.sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim)}
.sidebar-header .new-chat{background:var(--accent);border:none;color:#000;width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px;font-weight:600}
.sidebar-header .new-chat:hover{box-shadow:0 0 20px rgba(0,212,255,.25)}
.sidebar-search{padding:10px 12px;position:relative}
.sidebar-search input{width:100%;padding:7px 10px 7px 30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-dim)}
.sidebar-search svg{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-dim);pointer-events:none}
.chat-list{flex:1;overflow-y:auto;padding:6px}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:2px}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:rgba(0,212,255,.08)}
.chat-item .ci-icon{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--accent);background:rgba(0,212,255,.08)}
.chat-item .ci-info{flex:1;min-width:0}
.chat-item .ci-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item .ci-preview{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chat-item .ci-del{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:2px;border-radius:3px;opacity:0;transition:all .2s;display:flex}
.chat-item:hover .ci-del{opacity:.5}
.chat-item .ci-del:hover{opacity:1;color:var(--accent)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
.sidebar-footer button{background:none;border:none;color:var(--text-dim);padding:6px 8px;border-radius:6px;font-size:10px;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
.sidebar-footer button:hover{color:var(--text);background:var(--surface2)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;transition:background .5s}
.chat-area{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:10px;max-width:780px;margin:0 auto;width:100%;animation:msgIn .3s ease-out}
@keyframes msgIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600}
.msg.user .avatar{background:var(--accent);color:#000}
.msg.ai .avatar{background:rgba(139,92,246,.15);color:var(--accent2)}
.msg .bubble{padding:12px 16px;border-radius:12px;max-width:85%;line-height:1.6;font-size:14px;position:relative}
.msg.user .bubble{background:var(--user-bubble);border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--ai-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .bubble p{margin:6px 0}
.msg .bubble p:first-child{margin-top:0}
.msg .bubble p:last-child{margin-bottom:0}
.msg .bubble code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-size:13px;font-family:var(--mono)}
.msg .bubble pre{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0}
.msg .bubble pre code{background:none;padding:0;font-size:13px;line-height:1.5}
.msg .bubble ul,.msg .bubble ol{padding-left:20px;margin:6px 0}
.msg .bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.msg .bubble table th,.msg .bubble table td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.msg .bubble table th{background:var(--surface2);font-weight:500}
.msg .bubble blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--text-dim);font-style:italic}
.msg .bubble h1,.msg .bubble h2,.msg .bubble h3{margin:12px 0 6px;font-weight:600}
.msg .bubble h1{font-size:18px}
.msg .bubble h2{font-size:16px}
.msg .bubble h3{font-size:15px}
.msg .bubble a{color:var(--accent);text-decoration:none}
.msg .bubble a:hover{text-decoration:underline}
.msg .actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .2s}
.msg:hover .actions{opacity:1}
.msg .actions button{background:none;border:none;color:var(--text-dim);padding:3px 6px;border-radius:4px;cursor:pointer;font-size:10px;transition:all .2s;font-family:inherit}
.msg .actions button:hover{color:var(--text);background:var(--surface2)}
.streaming .bubble::after{content:'|';animation:blink .8s infinite;color:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:dotPulse 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1.2)}}
.input-bar{border-top:1px solid var(--border);padding:12px 16px;background:var(--surface);transition:background .5s}
.input-wrap{max-width:780px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:6px 6px 6px 14px;transition:border .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:var(--font);outline:none;resize:none;max-height:120px;line-height:1.5;padding:6px 0}
.input-wrap textarea::placeholder{color:var(--text-dim)}
.input-wrap .send-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--accent);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.input-wrap .send-btn:hover{box-shadow:0 0 20px rgba(0,212,255,.25)}
.input-wrap .send-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.input-wrap .send-btn svg{width:18px;height:18px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px;animation:msgIn .6s ease-out}
.welcome .logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(139,92,246,.15));display:flex;align-items:center;justify-content:center;margin-bottom:20px;border:1px solid var(--border)}
.welcome .logo svg{width:28px;height:28px;color:var(--accent)}
.welcome h1{font-size:22px;font-weight:500;margin-bottom:6px;letter-spacing:-.5px}
.welcome p{font-size:13px;color:var(--text-dim);max-width:360px;line-height:1.6}
.welcome .suggestions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.welcome .suggestions button{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.welcome .suggestions button:hover{border-color:var(--accent);color:var(--text);background:rgba(0,212,255,.06)}
.model-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);transition:background .5s}
.model-bar select{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;outline:none;font-family:inherit;cursor:pointer;transition:border .2s}
.model-bar select:focus{border-color:var(--accent)}
.model-bar select option{background:var(--surface)}
.model-bar .status{font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.model-bar .status .dot{width:5px;height:5px;border-radius:50%;background:var(--success,#3fb950)}
.model-bar .temp-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.model-bar .temp-wrap label{font-size:10px;color:var(--text-dim)}
.model-bar .temp-wrap input[type=range]{width:60px;height:2px;background:var(--border);border:none;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer}
.model-bar .temp-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#141414;border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:380px}
.modal h2{font-size:15px;font-weight:500;margin-bottom:14px}
.modal .field{margin-bottom:10px}
.modal .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;font-weight:500}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.modal .field input:focus,.modal .field select:focus{border-color:var(--accent)}
.modal .field select option{background:#141414}
.modal .modal-actions{display:flex;gap:8px;margin-top:14px}
.modal .modal-actions button{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.modal .modal-actions .btn-cancel{background:rgba(255,255,255,.04);color:var(--text-dim)}
.modal .modal-actions .btn-cancel:hover{color:var(--text);background:var(--surface-hover, rgba(255,255,255,.07))}
.modal .modal-actions .btn-save{background:var(--accent);color:#000;border-color:var(--accent)}
.modal .modal-actions .btn-save:hover{box-shadow:0 0 20px rgba(0,212,255,.2)}
.modal .field .api-note{font-size:10px;color:var(--text-dim);margin-top:4px;opacity:.7}

@media(max-width:700px){
  .sidebar{position:fixed;left:-100%;top:0;bottom:0;z-index:50;transition:left .3s;width:100%;max-width:300px}
  .sidebar.open{left:0}
  .sidebar-backdrop{position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.4);display:none}
  .sidebar-backdrop.show{display:block}
  .msg .bubble{max-width:92%;font-size:13px}
  .model-bar .temp-wrap{display:none}
  .chat-area{padding:16px 10px}
}
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>echo</h2>
    <button class="new-chat" id="newChatBtn" title="New chat">+</button>
  </div>
  <div class="sidebar-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchChats" placeholder="Search chats...">
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">
    <button id="themeBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Theme</button>
    <button id="settingsBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
  </div>
</aside>

<div class="main">
  <div class="model-bar">
    <select id="modelSelect">
      <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
      <option value="gemini-2.0-pro">Gemini 2.0 Pro</option>
      <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
    </select>
    <div class="status"><span class="dot"></span> Ready</div>
    <div class="temp-wrap">
      <label>Temp</label>
      <input type="range" id="tempSlider" min="0" max="200" value="70">
    </div>
    <button style="background:none;border:none;color:var(--text-dim);margin-left:auto;padding:4px;border-radius:4px;cursor:pointer;display:none" id="mobileMenuBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <h1>echo</h1>
      <p>Intelligent conversations, beautifully designed. Ask me anything.</p>
      <div class="suggestions">
        <button data-prompt="Explain quantum computing in simple terms">Quantum computing</button>
        <button data-prompt="Write a poem about artificial intelligence">Write a poem</button>
        <button data-prompt="Help me debug a React useEffect hook">Debug React</button>
        <button data-prompt="Summarize the theory of relativity">Relativity</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="chatInput" rows="1" placeholder="Type a message..." maxlength="10000"></textarea>
      <button class="send-btn" id="sendBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
</div>

<div class="overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="field">
      <label>Gemini API Key</label>
      <input type="text" id="apiKeyInput" placeholder="Enter your Gemini API key">
      <div class="api-note">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent);text-decoration:none">aistudio.google.com/apikey</a></div>
    </div>
    <div class="field">
      <label>Theme</label>
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="amoled">AMOLED</option>
      </select>
    </div>
    <div class="field">
      <label>Response Style</label>
      <select id="styleSelect">
        <option value="balanced">Balanced</option>
        <option value="concise">Concise</option>
        <option value="detailed">Detailed</option>
        <option value="creative">Creative</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="settingsClose">Close</button>
      <button class="btn-save" id="settingsSave">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ─── STATE ───
let chats = [];
let currentChatId = null;
let isStreaming = false;
let apiKey = localStorage.getItem('echo-api-key') || 'AIzaSyDtB85SRZKLg848rPCZWyQh7M8QLchuIrs';
let theme = localStorage.getItem('echo-theme') || 'dark';
let responseStyle = localStorage.getItem('echo-style') || 'balanced';

const $ = id => document.getElementById(id);
const chatArea = $('chatArea');
const chatInput = $('chatInput');
const sendBtn = $('sendBtn');
const chatList = $('chatList');
const welcome = $('welcome');
const searchInput = $('searchChats');

// ─── THEME ───
function setTheme(t) {
  theme = t; document.body.className = t === 'amoled' ? 'amoled' : t === 'light' ? 'light' : '';
  document.querySelector('meta[name=theme-color]').setAttribute('content', t === 'light' ? '#fff' : t === 'amoled' ? '#000' : '#0a0a0a');
  localStorage.setItem('echo-theme', t);
}
setTheme(theme);

// ─── CHAT STORAGE ───
function saveChats() { localStorage.setItem('echo-chats', JSON.stringify(chats)); }
function loadChats() {
  try { const r = localStorage.getItem('echo-chats'); if (r) chats = JSON.parse(r); } catch { chats = []; }
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function getCurrentChat() { return chats.find(c => c.id === currentChatId); }

// ─── RENDER CHATS ───
function renderChats() {
  const q = searchInput.value.toLowerCase();
  const filtered = chats.filter(c => c.title.toLowerCase().includes(q));
  if (filtered.length === 0) {
    chatList.innerHTML = '<div style="padding:16px;text-align:center;font-size:11px;color:var(--text-dim)">' + (q ? 'No chats found' : 'No chats yet') + '</div>';
    return;
  }
  chatList.innerHTML = filtered.map(c => {
    const last = c.messages.length > 0 ? c.messages[c.messages.length - 1] : null;
    const preview = last ? (last.content.slice(0, 40) + (last.content.length > 40 ? '…' : '')) : 'Empty chat';
    return `<div class="chat-item${c.id === currentChatId ? ' active' : ''}" data-id="${c.id}">
      <div class="ci-icon">💬</div>
      <div class="ci-info">
        <div class="ci-title">${escapeHtml(c.title)}</div>
        <div class="ci-preview">${escapeHtml(preview)}</div>
      </div>
      <button class="ci-del" data-id="${c.id}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>`;
  }).join('');
  chatList.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.ci-del')) return;
      switchChat(el.dataset.id);
    });
    el.querySelector('.ci-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteChat(el.dataset.id);
    });
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── CHAT OPERATIONS ───
function newChat() {
  const id = generateId();
  chats.unshift({ id, title: 'New chat', messages: [], createdAt: Date.now() });
  currentChatId = id;
  saveChats();
  renderChats();
  renderMessages();
  welcome.style.display = 'none';
  chatInput.focus();
  closeSidebar();
}

function switchChat(id) {
  if (isStreaming) return;
  currentChatId = id;
  renderChats();
  renderMessages();
  closeSidebar();
}

function deleteChat(id) {
  if (isStreaming) return;
  chats = chats.filter(c => c.id !== id);
  if (currentChatId === id) {
    currentChatId = chats.length > 0 ? chats[0].id : null;
    if (!currentChatId) welcome.style.display = 'flex';
  }
  saveChats();
  renderChats();
  renderMessages();
}

function renameChat(id, title) {
  const c = chats.find(x => x.id === id);
  if (c) { c.title = title; saveChats(); renderChats(); }
}

// ─── RENDER MESSAGES ───
function renderMessages() {
  const chat = getCurrentChat();
  chatArea.innerHTML = '';
  welcome.style.display = 'none';
  if (!chat) { welcome.style.display = 'flex'; return; }
  if (chat.messages.length === 0) { welcome.style.display = 'flex'; return; }
  chat.messages.forEach((m, i) => appendMessage(m.role, m.content, false));
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendMessage(role, content, animate = true) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (animate) div.style.animation = 'none';
  const avatar = role === 'user' ? 'U' : role === 'ai' ? 'AI' : 'S';
  const avatarBg = role === 'user' ? 'var(--accent)' : 'rgba(139,92,246,.15)';
  const avatarColor = role === 'user' ? '#000' : 'var(--accent2)';
  div.innerHTML = `<div class="avatar" style="background:${avatarBg};color:${avatarColor}">${avatar}</div><div class="bubble">${role === 'user' ? escapeHtml(content) : marked.parse(content)}</div>`;
  if (role === 'ai') {
    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button data-action="copy">Copy</button><button data-action="regenerate">Regenerate</button>`;
    actions.querySelector('[data-action="copy"]').addEventListener('click', () => {
      navigator.clipboard.writeText(content);
    });
    actions.querySelector('[data-action="regenerate"]').addEventListener('click', () => {
      if (isStreaming) return;
      const chat = getCurrentChat();
      if (chat && chat.messages.length >= 2) {
        chat.messages.pop();
        saveChats();
        renderMessages();
        sendToAI();
      }
    });
    div.querySelector('.bubble').after(actions);
  }
  chatArea.appendChild(div);
  if (animate) requestAnimationFrame(() => { div.style.animation = ''; });
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar" style="background:rgba(139,92,246,.15);color:var(--accent2)">AI</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ─── STREAMING ───
let streamAbort = false;

function createStreamBubble() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'msg ai streaming';
  div.id = 'streamBubble';
  div.innerHTML = `<div class="avatar" style="background:rgba(139,92,246,.15);color:var(--accent2)">AI</div><div class="bubble"></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

async function streamResponse(text, bubbleEl) {
  const bubble = bubbleEl.querySelector('.bubble');
  let displayed = '';
  const words = text.split(' ');
  for (let i = 0; i < words.length; i++) {
    if (streamAbort) break;
    displayed += (i > 0 ? ' ' : '') + words[i];
    bubble.innerHTML = marked.parse(displayed);
    if (i % 2 === 0) chatArea.scrollTop = chatArea.scrollHeight;
    await sleep(20 + Math.random() * 30);
  }
  bubbleEl.classList.remove('streaming');
  const fullContent = bubble.innerHTML;
  bubble.innerHTML = marked.parse(text);
  return text;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── GEMINI API ───
async function sendToAI() {
  const chat = getCurrentChat();
  if (!chat || isStreaming) return;
  isStreaming = true;
  streamAbort = false;
  sendBtn.disabled = true;
  chatInput.disabled = true;
  showTyping();

  const styleMap = { balanced: 'You are a helpful, balanced assistant.', concise: 'Be very concise. Short answers.', detailed: 'Provide detailed, thorough answers.', creative: 'Be creative and imaginative in your responses.' };
  const sysPrompt = styleMap[responseStyle] || styleMap.balanced;

  const context = chat.messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: m.content }] }));

  try {
    if (!apiKey) {
      await sleep(800);
      const fallback = getFallbackResponse(chat.messages[chat.messages.length - 1]?.content || '');
      removeTyping();
      const sb = createStreamBubble();
      const full = await streamResponse(fallback, sb);
      chat.messages.push({ role: 'ai', content: full, timestamp: Date.now() });
      saveChats();
      renderChats();
      isStreaming = false;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
      return;
    }

    const temp = parseInt($('tempSlider').value) / 100;
    const model = $('modelSelect').value;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`;
    const body = { contents: [{ role: 'user', parts: [{ text: sysPrompt + '\n\n' + chat.messages.map(m => (m.role === 'user' ? 'User: ' : 'Assistant: ') + m.content).join('\n') }] }], generationConfig: { temperature: temp, maxOutputTokens: 4096 } };

    const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!resp.ok) {
      const err = await resp.text();
      removeTyping();
      appendMessage('ai', '⚠️ API error: ' + (resp.status === 403 ? 'Invalid API key. Set one in Settings.' : resp.status + ' ' + err));
      isStreaming = false;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      return;
    }

    removeTyping();
    const sb = createStreamBubble();
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
          try {
            const json = JSON.parse(line.slice(6));
            const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
            if (text) {
              fullText += text;
              const bubble = sb.querySelector('.bubble');
              bubble.innerHTML = marked.parse(fullText);
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch {}
        }
      }
    }

    sb.classList.remove('streaming');
    const finalBubble = sb.querySelector('.bubble');
    finalBubble.innerHTML = marked.parse(fullText);
    chat.messages.push({ role: 'ai', content: fullText, timestamp: Date.now() });
    saveChats();
    renderChats();
  } catch (e) {
    removeTyping();
    appendMessage('ai', '⚠️ Error: ' + e.message);
  }
  isStreaming = false;
  sendBtn.disabled = false;
  chatInput.disabled = false;
  chatInput.focus();
}

// ─── FALLBACK RESPONSES ───
function getFallbackResponse(msg) {
  const q = msg.toLowerCase();
  if (q.includes('quantum')) return "Quantum computing leverages **superposition** and **entanglement** to process information in ways classical computers can't.\n\nUnlike bits (0 or 1), **qubits** can exist in multiple states simultaneously. This enables certain calculations — like factoring large numbers or simulating molecules — to be done exponentially faster.\n\nKey concepts:\n- **Superposition**: Qubits exist in multiple states at once\n- **Entanglement**: Qubits remain correlated even across distance\n- **Interference**: Amplify correct answers, cancel wrong ones\n\nIt's still early days — we're in the **NISQ** (Noisy Intermediate-Scale Quantum) era — but the potential is enormous.";
  if (q.includes('poem') || q.includes('write')) return "Here's a poem for you:\n\n---\n\n**Electric Dreams**\n\nIn circuits deep and wires fine,\nA mind of silicon and line,\nIt learns to speak in ones and zeros,\nTo think like us — or so it appears.\n\nIt's trained on words we've left behind,\nOn every thought that crossed our mind,\nA ghost in code, a digital flame,\nWithout a heart — yet not the same.\n\nWe ask it questions, seek its grace,\nReflected back — a human face.\nAnd in that mirror, what we see,\nIs us — or what we'd like to be.\n\n---\n\nWould you like a different style?";
  if (q.includes('debug') || q.includes('react')) return "Here's how to debug a React `useEffect` hook:\n\n**1. Check the dependency array**\n```jsx\nuseEffect(() => {\n  console.log('Effect ran');\n}, [dependency]) // ← missing deps cause stale closures\n```\n\n**2. Common issues**\n- **Missing deps** → effect uses old values\n- **Infinite loops** → effect updates a dep → re-render → effect again\n- **Cleanup not returning** → subscriptions/event listeners leak\n\n**3. Fix pattern**\n```jsx\nuseEffect(() => {\n  fetchData(id).then(setData);\n  return () => { /* cleanup */ };\n}, [id]);\n```\n\nUse the **React DevTools** Profiler to trace re-renders. What specific issue are you hitting?";
  if (q.includes('relativity')) return "**Einstein's theory of relativity** has two parts:\n\n### Special Relativity (1905)\n- The laws of physics are the same in all inertial frames\n- The speed of light is constant for all observers\n- **E = mc²** — energy and mass are equivalent\n- Time **dilates** as you approach light speed\n\n### General Relativity (1915)\n- Gravity is **curvature of spacetime**, not a force\n- Massive objects warp space around them\n- Predicted **black holes**, **gravitational waves**, **gravitational lensing**\n\n> \"Space tells matter how to move; matter tells space how to curve.\"\n\nGPS satellites need **relativistic corrections** — both special (time dilation from velocity) and general (time speeding up from weaker gravity) — to function accurately.";
  return "That's a fascinating question! Here's what I can tell you:\n\n**Great question!** While I'm running in demo mode (no API key configured), I'd normally give you a comprehensive answer.\n\nTo enable full AI responses:\n1. Click **Settings** in the sidebar\n2. Enter your **Gemini API key** (free from [Google AI Studio](https://aistudio.google.com/apikey))\n3. The app will use Gemini to answer anything\n\nKey features of echo:\n- **Streaming responses** — text appears live as it's generated\n- **Markdown rendering** — code blocks, tables, lists, math\n- **Multiple models** — Gemini Flash (fast) or Pro (powerful)\n- **Temperature control** — adjust creativity\n- **Chat history** — saved locally, searchable\n\nTry enabling the API key — it's free and unlocks the full experience!";
}

// ─── SEND MESSAGE ───
function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;
  let chat = getCurrentChat();
  if (!chat) { newChat(); chat = getCurrentChat(); }
  chat.messages.push({ role: 'user', content: text, timestamp: Date.now() });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
  }
  saveChats();
  renderChats();
  appendMessage('user', text);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;
  sendToAI();
}

// ─── EVENT LISTENERS ───
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  sendBtn.disabled = !chatInput.value.trim() || isStreaming;
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);
$('newChatBtn').addEventListener('click', newChat);

searchInput.addEventListener('input', renderChats);

$('settingsBtn').addEventListener('click', () => {
  $('apiKeyInput').value = apiKey;
  $('themeSelect').value = theme;
  $('styleSelect').value = responseStyle;
  $('settingsModal').classList.add('open');
});

$('settingsClose').addEventListener('click', () => $('settingsModal').classList.remove('open'));
$('settingsModal').addEventListener('click', e => { if (e.target === $('settingsModal')) $('settingsModal').classList.remove('open'); });

$('settingsSave').addEventListener('click', () => {
  apiKey = $('apiKeyInput').value.trim();
  localStorage.setItem('echo-api-key', apiKey);
  responseStyle = $('styleSelect').value;
  localStorage.setItem('echo-style', responseStyle);
  setTheme($('themeSelect').value);
  $('settingsModal').classList.remove('open');
});

$('themeBtn').addEventListener('click', () => {
  const modes = ['dark', 'light', 'amoled'];
  const idx = modes.indexOf(theme);
  setTheme(modes[(idx + 1) % modes.length]);
  $('themeSelect').value = theme;
});

document.querySelectorAll('#welcome .suggestions button').forEach(btn => {
  btn.addEventListener('click', () => {
    chatInput.value = btn.dataset.prompt;
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = false;
    sendMessage();
  });
});

// ─── MOBILE SIDEBAR ───
const mobileMenuBtn = $('mobileMenuBtn');
const sidebarBackdrop = $('sidebarBackdrop');
const sidebar = $('sidebar');

function toggleSidebar() { sidebar.classList.toggle('open'); sidebarBackdrop.classList.toggle('show'); }
function closeSidebar() { sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('show'); }
mobileMenuBtn.addEventListener('click', toggleSidebar);
sidebarBackdrop.addEventListener('click', closeSidebar);

// Show mobile menu button on small screens
if (window.innerWidth <= 700) mobileMenuBtn.style.display = 'block';
window.addEventListener('resize', () => {
  mobileMenuBtn.style.display = window.innerWidth <= 700 ? 'block' : 'none';
});

// ─── INIT ───
loadChats();
if (chats.length > 0) { currentChatId = chats[0].id; renderMessages(); renderChats(); }
else { welcome.style.display = 'flex'; renderChats(); }
chatInput.focus();
</script>
